<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Refer To Your Friends and Earn</title>
  <link rel="stylesheet" href="css/refer_hero.css" />
</head>
<body>

  <section class="refer_hero_section">
    <div class="refer_hero_container">

      <!-- Left: text content -->
      <div class="refer_hero_left">
        <h1 class="refer_hero_title">
          Refer To Your<br />
          <span class="refer_hero_title_accent">Friends</span> <span class="refer_hero_title" >and</span>  <span class="refer_hero_title_accent">Earn</span>
        </h1>

        <p class="refer_hero_desc">
          Turn your friends and network into value. Refer learners to our
          platform where you get rewards and then get discounted access to
          our courses
        </p>

        <button type="button" class="refer_hero_cta" id="referHeroCtaBtn">
          Refer Now
        </button>

        <div class="refer_hero_stats_card" id="referHeroStatsCard">
          <div class="refer_hero_avatar_group">
            <svg class="refer_hero_avatar" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#F2B24A"/><circle cx="20" cy="16" r="7" fill="#8A5A2B"/><path d="M6 36c0-9 8-13 14-13s14 4 14 13" fill="#8A5A2B"/></svg>
            <svg class="refer_hero_avatar" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#8FA6C9"/><circle cx="20" cy="16" r="7" fill="#2E3A4B"/><path d="M6 36c0-9 8-13 14-13s14 4 14 13" fill="#2E3A4B"/></svg>
            <svg class="refer_hero_avatar" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#E58C6A"/><circle cx="20" cy="16" r="7" fill="#5A3825"/><path d="M6 36c0-9 8-13 14-13s14 4 14 13" fill="#5A3825"/></svg>
            <svg class="refer_hero_avatar" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#6FBF9B"/><circle cx="20" cy="16" r="7" fill="#274B3B"/><path d="M6 36c0-9 8-13 14-13s14 4 14 13" fill="#274B3B"/></svg>
          </div>
          <p class="refer_hero_avatar_count">
            <span class="refer_hero_avatar_count_number" id="referHeroCount">0</span>+ Referrer's
          </p>
        </div>
      </div>

      <!-- Right: illustration -->
      <div class="refer_hero_right">
        <img
          src="assets/boy_refer.png"
          alt="Referral network illustration"
          class="refer_hero_illustration"
        />
      </div>

    </div>
  </section>

  <script src="js/refer_hero.js"></script>
</body>
</html>
